<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Your Colors</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>🌈 Choose Your Colors</h1>

    <p class="intro">
        Select <b>exactly 5 colors</b> that best represent your personality.
    </p>

    <div class="colors">

        <div class="card color-card" data-color="red">
            <div class="circle red"></div>
            <h2>Red</h2>
        </div>

        <div class="card color-card" data-color="orange">
            <div class="circle orange"></div>
            <h2>Orange</h2>
        </div>

        <div class="card color-card" data-color="yellow">
            <div class="circle yellow"></div>
            <h2>Yellow</h2>
        </div>

        <div class="card color-card" data-color="green">
            <div class="circle green"></div>
            <h2>Green</h2>
        </div>

        <div class="card color-card" data-color="blue">
            <div class="circle blue"></div>
            <h2>Blue</h2>
        </div>

        <div class="card color-card" data-color="indigo">
            <div class="circle indigo"></div>
            <h2>Indigo</h2>
        </div>

        <div class="card color-card" data-color="violet">
            <div class="circle violet"></div>
            <h2>Violet</h2>
        </div>

    </div>

    <p id="count">Selected: 0 / 5</p>

    <button id="submitBtn">Continue</button>

    <script src="script.js"></script>

</body>
</html>
